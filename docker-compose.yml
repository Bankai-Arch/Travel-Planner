version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: travel_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: travel_redis
    ports:
      - "6379:6379"

  server:
    build: ./server
    container_name: travel_server
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/travel-platform
      - REDIS_URL=redis://redis:6379
    env_file:
      - ./server/.env
    depends_on:
      - mongodb
      - redis
    volumes:
      - ./server:/app
      - /app/node_modules

  client:
    build: ./client
    container_name: travel_client
    ports:
      - "3000:3000"
    env_file:
      - ./client/.env.local
    depends_on:
      - server
    volumes:
      - ./client:/app
      - /app/node_modules

volumes:
  mongo_data:
